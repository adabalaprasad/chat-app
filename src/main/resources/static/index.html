<!DOCTYPE html>
<html>
<head>
    <title>Chat APP</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdn.jsdelivr.net/npm/sockjs-client/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs/lib/stomp.min.js"></script>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #ece5dd;
        }

        .chat-container {
            max-width: 450px;
            margin: auto;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: white;
        }

        .header {
            background: #075e54;
            color: white;
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .avatar {
            width: 40px;
            height: 40px;
            background: #25d366;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
        }

        .header-text {
            display: flex;
            flex-direction: column;
        }

        .header-text small {
            font-size: 12px;
            color: #d3f8d3;
        }

        #messages {
            list-style: none;
            margin: 0;
            padding: 10px;
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            background: #ece5dd;
        }

        .message {
            max-width: 75%;
            padding: 8px 12px;
            margin-bottom: 10px;
            border-radius: 10px;
            word-wrap: break-word;
        }

        .my-message {
            align-self: flex-end;
            background: #dcf8c6;
        }

        .other-message {
            align-self: flex-start;
            background: white;
        }

        .sender-name {
            font-size: 12px;
            color: gray;
            margin-bottom: 4px;
            font-weight: bold;
        }

        .time {
            font-size: 10px;
            text-align: right;
            color: gray;
            margin-top: 4px;
        }

        .input-area {
            display: flex;
            padding: 10px;
            background: white;
            border-top: 1px solid #ddd;
        }

        #msg {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 20px;
            background: #f0f0f0;
            outline: none;
        }

        button {
            margin-left: 10px;
            border: none;
            background: #25d366;
            color: white;
            padding: 10px 15px;
            border-radius: 50%;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="chat-container">

    <div class="header">
        <div class="avatar" id="avatar"></div>
        <div class="header-text">
            <span id="userLabel"></span>
            <small id="statusText">online</small>
        </div>
    </div>

    <ul id="messages"></ul>

    <div class="input-area">
        <input id="msg" placeholder="Type a message..." onkeypress="handleKey(event)">
        <button onclick="sendMessage()">➤</button>
    </div>

</div>

<script>

let sender = "";
let typingTimeout;

window.onload = function() {
    sender = prompt("Enter your name");

    if (!sender || sender.trim() === "") {
        sender = "Anonymous";
    }

    document.getElementById("userLabel").textContent = sender;
    document.getElementById("avatar").textContent = sender.charAt(0).toUpperCase();
};

let socket = new SockJS('/chat');
let stompClient = Stomp.over(socket);

stompClient.connect({}, function() {

    stompClient.subscribe('/topic/messages', function(message) {

        let msg = JSON.parse(message.body);

        let li = document.createElement("li");
        li.classList.add("message");

        if (msg.sender === sender) {
            li.classList.add("my-message");
        } else {
            li.classList.add("other-message");
        }

        let time = new Date().toLocaleTimeString([], {
            hour: '2-digit',
            minute: '2-digit'
        });

        li.innerHTML =
            "<div class='sender-name'>" + msg.sender + "</div>" +
            "<div>" + msg.content + "</div>" +
            "<div class='time'>" + time + "</div>";

        document.getElementById("messages").appendChild(li);

        document.getElementById("statusText").textContent = "online";

        let chatBox = document.getElementById("messages");
        chatBox.scrollTop = chatBox.scrollHeight;
    });

    stompClient.subscribe('/topic/typing', function(message) {

        let typingUser = message.body;

        if (typingUser !== sender) {

            let status = document.getElementById("statusText");

            status.textContent = typingUser + " is typing...";

            clearTimeout(typingTimeout);

            typingTimeout = setTimeout(() => {
                status.textContent = "online";
            }, 1500);
        }
    });

});

function sendMessage() {

    let msgInput = document.getElementById("msg");
    let msg = msgInput.value.trim();

    if (msg !== "") {

        stompClient.send("/app/send", {}, JSON.stringify({
            sender: sender,
            content: msg
        }));

        msgInput.value = "";
        msgInput.focus();
    }
}

function handleKey(event) {

    stompClient.send("/app/typing", {}, sender);

    if (event.key === "Enter") {
        sendMessage();
    }
}

</script>

</body>
</html>
